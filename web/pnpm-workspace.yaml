# pnpm 11 reads project settings from this file, not the "pnpm" field in package.json.

# Supply-chain hardening: refuse dependency versions published within the last
# day (1440 minutes). This is the pnpm 11 default; pinned here explicitly.
minimumReleaseAge: 1440

# Security override — force a minimum safe version of ws.
overrides:
  'ws@>=8.0.0 <8.17.1': '>=8.17.1'

# Trusted packages allowed to run install/build scripts.
# pnpm 11 blocks all dependency lifecycle scripts by default.
allowBuilds:
  '@reown/appkit': true
  'bufferutil': true
  'esbuild': true
  'keccak': true
  'utf-8-validate': true
